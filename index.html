<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        function showOverlay(title, details) {
          try {
            var el = document.getElementById("__dev_error_overlay__");
            if (!el) {
              el = document.createElement("div");
              el.id = "__dev_error_overlay__";
              el.style.position = "fixed";
              el.style.inset = "0";
              el.style.zIndex = "999999";
              el.style.padding = "24px";
              el.style.background = "#ffffff";
              el.style.color = "#111827";
              el.style.fontFamily =
                "ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial";
              el.style.overflow = "auto";
              document.documentElement.appendChild(el);
            }
            el.innerHTML =
              '<div style="max-width: 980px; margin: 0 auto;">' +
              '<div style="font-size: 22px; font-weight: 800; margin-bottom: 8px;">' +
              title +
              "</div>" +
              '<div style="font-size: 13px; opacity: 0.75; margin-bottom: 12px;">This is a dev-only overlay to prevent a blank screen. Fix the first error below.</div>' +
              '<pre style="background:#0b1220;color:#e5e7eb;padding:16px;border-radius:12px;white-space:pre-wrap;line-height:1.45;">' +
              String(details || "") +
              "</pre>" +
              '<div style="margin-top: 12px; display:flex; gap: 12px; flex-wrap: wrap;">' +
              '<button onclick="location.reload()" style="background:#177043;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;">Reload</button>' +
              '<button onclick="document.getElementById(\\\"__dev_error_overlay__\\\").remove()" style="background:#e5e7eb;color:#111827;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;">Dismiss</button>' +
              "</div>" +
              "</div>";
          } catch (e) {
            // If overlay fails, fall back to console only.
          }
        }

        window.addEventListener("error", function (e) {
          var msg = e && e.error ? (e.error.stack || e.error.message || e.error) : e.message;
          showOverlay("Runtime error", msg);
        });

        window.addEventListener("unhandledrejection", function (e) {
          var r = e && e.reason ? e.reason : e;
          var msg = r && r.stack ? r.stack : r && r.message ? r.message : String(r);
          showOverlay("Unhandled promise rejection", msg);
        });
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>getvia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
